<script>
fetch("https://mizanurislam.infinityfree.me/backend/api.php", {
    method: "GET",
    mode: "cors"
})
.then(response => {
    if (!response.ok) {
        throw new Error("Network response was not ok");
    }
    return response.json();
})
.then(data => {
    document.getElementById("result").innerHTML = data.name;
})
.catch(error => {
    console.error("Error:", error);
});
</script>
